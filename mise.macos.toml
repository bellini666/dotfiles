[bootstrap.user]
login_shell = "/opt/homebrew/bin/zsh"

# Homebrew packages, loaded only when MISE_ENV=macos (set by bootstrap.sh).
# Kept out of the shared mise.toml because mise treats `brew:` as cross-platform
# and would otherwise try to resolve/install these on Linux too.

[bootstrap.packages]
"brew:antidote" = "latest"
"brew:ast-grep" = "latest"
"brew:bat" = "latest"
"brew:bottom" = "latest"
"brew:btop" = "latest"
"brew:cheat" = "latest"
"brew:cmake" = "latest"
"brew:cpanminus" = "latest"
"brew:curl" = "latest"
"brew:delta" = "latest"
"brew:docker" = "latest"
"brew:docker-buildx" = "latest"
"brew:docker-compose" = "latest"
"brew:docker-credential-helper" = "latest"
"brew:docker-credential-helper-ecr" = "latest"
"brew:duf" = "latest"
"brew:eugene1g/safehouse/agent-safehouse" = "latest"
"brew:eza" = "latest"
"brew:fd" = "latest"
"brew:ffmpegthumbnailer" = "latest"
"brew:fzf" = "latest"
"brew:gdal" = "latest"
"brew:gh" = "latest"
"brew:git" = "latest"
"brew:git-delta" = "latest"
"brew:glab" = "latest"
"brew:gnu-sed" = "latest"
"brew:go-task" = "latest"
"brew:graphicsmagick" = "latest"
"brew:gs" = "latest"
"brew:haproxy" = "latest"
"brew:htop" = "latest"
"brew:imagemagick" = "latest"
"brew:jj" = "latest"
"brew:jq" = "latest"
"brew:k9s" = "latest"
"brew:kubectl" = "latest"
"brew:kubectx" = "latest"
"brew:lazygit" = "latest"
"brew:libffi" = "latest"
"brew:libtool" = "latest"
"brew:luarocks" = "latest"
"brew:make" = "latest"
"brew:md5sha1sum" = "latest"
"brew:mise" = "latest"
"brew:mole" = "latest"
"brew:ninja" = "latest"
"brew:openssl" = "latest"
"brew:pgcli" = "latest"
"brew:pipx" = "latest"
"brew:poppler" = "latest"
"brew:readline" = "latest"
"brew:redis" = "latest"
"brew:ripgrep" = "latest"
"brew:sd" = "latest"
"brew:shellcheck" = "latest"
"brew:shfmt" = "latest"
"brew:snitch" = "latest"
"brew:sox" = "latest"
"brew:sqlite" = "latest"
"brew:starship" = "latest"
"brew:stylua" = "latest"
"brew:taplo" = "latest"
"brew:tectonic" = "latest"
"brew:unar" = "latest"
"brew:universal-ctags" = "latest"
"brew:uv" = "latest"
"brew:watchman" = "latest"
"brew:wget" = "latest"
"brew:xmlsectool" = "latest"
"brew:xz" = "latest"
"brew:yq" = "latest"
"brew:zlib" = "latest"
"brew:zoxide" = "latest"
"brew:zsh" = "latest"

# Casks are not in mise: its brew-cask backend only supports .app artifacts,
# while half of these are binary/font/pkg casks. They live in packages/brew-casks
# and are installed by the _system step in bootstrap.sh.
