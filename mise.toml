[dotfiles]
# Sources are relative to this file (~/.dotfiles). Default mode is symlink.
"~/.claude/CLAUDE.md" = "agents/AGENTS.md"
"~/.config/opencode/AGENTS.md" = "agents/AGENTS.md"
"~/.codex/AGENTS.md" = "agents/AGENTS.md"
"~/.claude/settings.json" = "agents/claude.json"
"~/.config/opencode/opencode.json" = "agents/opencode.json"
"~/.codex/config.toml" = "agents/codex.toml"
"~/.config/opencode/skills" = "agents/skills"
"~/.codex/skills" = "agents/skills"
"~/.config/ghostty" = "ghostty"
"~/.gitattributes" = "git/gitattributes"
"~/.gitconfig" = "git/gitconfig"
"~/.gitignore" = "git/gitignore"
"~/.config/kitty" = "kitty"
"~/.pdbrc.py" = "python/pdbrc.py"
"~/.config/starship.toml" = "starship/starship.toml"
"~/.config/nvim" = "vim"
"~/.zsh_plugins.txt" = "zsh/zsh_plugins.txt"
"~/.zshrc" = "zsh/zshrc"

[tasks.bootstrap]
description = "Project-specific setup that doesn't fit the declarative sections"
run = "poetry config virtualenvs.in-project true"
