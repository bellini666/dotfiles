[mcp_servers.context7]
url = "https://mcp.context7.com/mcp/oauth"

[mcp_servers.beeper]
url = "http://localhost:23373/v0/mcp"
enabled = false

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--headless=true", "--isolated=true"]
enabled = false

[[hooks.PreToolUse]]
matcher = "^Bash$"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "node $HOME/.dotfiles/agents/hooks/pre-tool-use/block-dangerous-commands.js"

[[hooks.PreToolUse]]
matcher = "^(Bash|apply_patch)$"
[[hooks.PreToolUse.hooks]]
type = "command"
command = "node $HOME/.dotfiles/agents/hooks/pre-tool-use/protect-secrets.js"
